<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.85" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <rect width="256" height="256" rx="56" fill="url(#bg)" />
  
  <!-- Carta de trás inclinada -->
  <rect x="58" y="38" width="140" height="180" rx="16" fill="url(#card2)" transform="rotate(12 128 128)" filter="url(#shadow)" />
  
  <!-- Carta da frente -->
  <rect x="58" y="38" width="140" height="180" rx="16" fill="url(#card1)" filter="url(#shadow)" />
  
  <!-- Símbolo no meio (V de acerto) -->
  <path d="M100 135l20 20 40-45" fill="none" stroke="#6366f1" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Linhas decorativas (como se fossem perguntas) -->
  <rect x="85" y="70" width="86" height="12" rx="6" fill="#cbd5e1" />
  <rect x="85" y="94" width="50" height="12" rx="6" fill="#cbd5e1" />
</svg>
